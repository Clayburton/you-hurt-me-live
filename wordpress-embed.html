<!-- ============================================================
     you hurt me — clay and kelsy · live lyric video
     Paste this whole block into a WordPress "Custom HTML" block.

     HOW THE iOS BARS WORK: Safari paints its status-bar area and
     bottom-toolbar surround from the TOP page's html/body background.
     The <style> starts them white to match the landing; the <script>
     listens for the player's colour messages and repaints the parent
     on every cut — so the final white→black flip extends into the
     phone's own chrome.
     ============================================================ -->
<style>
  html, body { background: #fff !important; transition: none !important; }
</style>
<div id="yhm-embed" style="position:relative;width:100vw;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;height:100svh;height:100dvh;background:#fff;overflow:hidden;">
  <iframe
    src="https://clayburton.github.io/you-hurt-me-live/"
    title="you hurt me — clay and kelsy"
    loading="lazy"
    allow="fullscreen; autoplay"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;">
  </iframe>
</div>
<script>
(function () {
  var wrap = document.getElementById('yhm-embed');
  window.addEventListener('message', function (e) {
    if (e.origin !== 'https://clayburton.github.io') return;   // only trust the lyric video
    var d = e.data;
    if (!d || d.iam !== 'bg' || typeof d.color !== 'string') return;
    if (!/^#[0-9a-fA-F]{3,8}$/.test(d.color)) return;          // colours only
    document.documentElement.style.setProperty('background', d.color, 'important');
    document.body.style.setProperty('background', d.color, 'important');
    if (wrap) wrap.style.setProperty('background', d.color, 'important');
  });
}());
</script>
