<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>you hurt me — clay and kelsy</title>

  <!-- the video's exact faces: Adobe Fonts kit (Helvetica Neue LT Pro, Clarendon URW,
       Arial Rounded, Stencil, Rosewood, Cottonwood, HWT Artz, Brush Script, Felt Tip,
       Letter Gothic, Prestige Elite, LTC Bodoni 175, Marcel Script) -->
  <link rel="stylesheet" href="https://use.typekit.net/moh2jyv.css">

  <!-- Bodoni (roman + italic, all weights) + brand mono + landing serif + one scratchy hand -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Rock+Salt&display=block" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <!-- ============ THE STAGE ============ -->
  <div id="stage" class="stage" aria-hidden="true">
    <canvas id="scars"></canvas>
    <div id="cueLayer" class="cue-layer"></div>
  </div>
  <div id="weapon" aria-hidden="true"></div>
  <div id="lvlup" aria-hidden="true"></div>

  <audio id="song" src="assets/you-hurt-me.mp3" preload="auto"></audio>

  <!-- ============ LANDING ============ -->
  <section id="landing" class="landing">
    <div class="landing__mark">
      <div class="landing__eyebrow">clay and kelsy</div>
      <h1 class="landing__title">you hurt me</h1>
      <button id="playBtn" class="playbtn" type="button" aria-label="Play">
        <span class="playbtn__tri" aria-hidden="true"></span>
      </button>
    </div>
  </section>

  <!-- ============ END CARD ============ -->
  <section id="endcard" class="endcard" hidden>
    <div id="verdict" hidden></div>
    <a id="goBack" class="endcard__link" href="https://clayandkelsy.com/i-am/" target="_top" rel="noopener">[ go back ]</a>
    <button id="replayBtn" class="endcard__btn" type="button">[ replay ]</button>
  </section>

  <div id="toast" class="toast" role="status"></div>

  <script src="cues.js?v=12"></script>
  <script src="game.js?v=4"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
